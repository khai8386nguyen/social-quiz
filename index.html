<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's your social style?</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .site {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .screen { display: none; padding: 3rem 2.5rem; animation: fadeIn 0.3s ease; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Home screen */
    .hero-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: #EEEDFE; display: flex; align-items: center;
      justify-content: center; margin-bottom: 1.5rem;
    }
    .hero-icon i { font-size: 32px; color: #534AB7; }
    .hero-title { font-size: 26px; font-weight: 600; color: #111; text-align: center; margin-bottom: 0.5rem; }
    .hero-sub { font-size: 15px; color: #666; text-align: center; margin-bottom: 2rem; line-height: 1.6; max-width: 380px; }
    .start-btn {
      padding: 0.75rem 2.5rem; background: #7F77DD; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer;
    }
    .start-btn:hover { background: #534AB7; }

    /* Quiz screen */
    .quiz-wrap { width: 100%; }
    .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .progress-bg { flex: 1; height: 4px; background: #e5e5e5; border-radius: 99px; }
    .progress-fill { height: 4px; border-radius: 99px; background: #7F77DD; transition: width 0.4s ease; }
    .progress-label { font-size: 13px; color: #999; white-space: nowrap; }
    .q-text { font-size: 19px; font-weight: 500; color: #111; margin-bottom: 1.5rem; line-height: 1.45; }

    .opt {
      display: flex; align-items: flex-start; gap: 12px;
      width: 100%; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
      border-radius: 12px; border: 0.5px solid #ddd;
      background: #fff; color: #222; font-size: 15px;
      cursor: pointer; text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
    }
    .opt:hover { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; }
    .opt.selected { border: 2px solid #7F77DD; background: #EEEDFE; color: #3C3489; font-weight: 500; }
    .opt-letter {
      width: 24px; height: 24px; border-radius: 50%; border: 0.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; opacity: 0.6;
    }
    .next-btn {
      width: 100%; margin-top: 0.5rem; padding: 0.75rem;
      border-radius: 8px; border: none; background: #7F77DD;
      color: #fff; font-size: 15px; font-weight: 500; cursor: pointer;
      display: none; font-family: inherit;
    }
    .next-btn:hover { background: #534AB7; }

    /* Result screen */
    .result-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 99px;
      font-size: 13px; font-weight: 500; margin-bottom: 1rem;
    }
    .result-type { font-size: 28px; font-weight: 600; color: #111; margin-bottom: 0.75rem; text-align: center; }
    .result-desc { font-size: 15px; color: #555; text-align: center; line-height: 1.6; margin-bottom: 2rem; max-width: 400px; }

    .score-section {
      width: 100%; background: #fafafa; border: 0.5px solid #e5e5e5;
      border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem;
    }
    .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .score-row:last-child { margin-bottom: 0; }
    .score-name { font-size: 13px; color: #666; width: 70px; text-align: right; }
    .score-bg { flex: 1; height: 8px; background: #e5e5e5; border-radius: 99px; overflow: hidden; }
    .score-inner { height: 100%; border-radius: 99px; transition: width 0.7s ease; width: 0%; }
    .score-pct { font-size: 13px; color: #666; width: 34px; }

    .action-row { display: flex; gap: 10px; width: 100%; }
    .retry-btn {
      flex: 1; padding: 0.7rem; border-radius: 8px;
      border: 0.5px solid #ccc; background: #fff; color: #222;
      font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .retry-btn:hover { background: #f5f5f5; }
    .share-btn {
      flex: 1; padding: 0.7rem; border-radius: 8px;
      border: none; background: #7F77DD; color: #fff;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    .share-btn:hover { background: #534AB7; }
    .share-toast { font-size: 13px; color: #0F6E56; margin-top: 0.75rem; text-align: center; display: none; }

    footer { text-align: center; font-size: 12px; color: #aaa; padding: 1rem; border-top: 0.5px solid #eee; }
  </style>
</head>
<body>

<div class="site">
  <!-- Home -->
  <div class="screen active" id="screen-home">
    <div class="hero-icon"><i class="ti ti-brain"></i></div>
    <div class="hero-title">What's your social style?</div>
    <div class="hero-sub">5 quick questions to find out whether you're an introvert, ambivert, or extrovert.</div>
    <button class="start-btn" onclick="startQuiz()">Start quiz &rarr;</button>
  </div>

  <!-- Quiz -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-wrap">
      <div class="progress-row">
        <div class="progress-bg"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="progress-label" id="prog-label">1 / 5</div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div id="q-options"></div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">Next</button>
    </div>
  </div>

  <!-- Result -->
  <div class="screen" id="screen-result">
    <div style="width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;">
      <div class="result-badge" id="result-badge"></div>
      <div class="result-type" id="result-type"></div>
      <div class="result-desc" id="result-desc"></div>
      <div class="score-section">
        <div class="score-row">
          <div class="score-name">Extrovert</div>
          <div class="score-bg"><div class="score-inner" id="bar-e" style="background:#EF9F27;"></div></div>
          <div class="score-pct" id="pct-e">0%</div>
        </div>
        <div class="score-row">
          <div class="score-name">Ambivert</div>
          <div class="score-bg"><div class="score-inner" id="bar-a" style="background:#1D9E75;"></div></div>
          <div class="score-pct" id="pct-a">0%</div>
        </div>
        <div class="score-row">
          <div class="score-name">Introvert</div>
          <div class="score-bg"><div class="score-inner" id="bar-i" style="background:#7F77DD;"></div></div>
          <div class="score-pct" id="pct-i">0%</div>
        </div>
      </div>
      <div class="action-row">
        <button class="retry-btn" onclick="restart()">&#8635; Retake</button>
        <button class="share-btn" onclick="shareResult()">&#8679; Share result</button>
      </div>
      <div class="share-toast" id="share-toast">&#10003; Copied to clipboard!</div>
    </div>
  </div>

  <footer>Made with Claude &middot; github.io</footer>
</div>

<script>
  const questions = [
    { text: "It's Friday evening. What sounds most appealing?", options: [{ text: "Heading out to a party or gathering", e:2,i:0 }, { text: "Staying in with a book or solo hobby", e:0,i:2 }] },
    { text: "After a draining week, how do you recharge?", options: [{ text: "Catching up with friends — people lift me", e:2,i:0 }, { text: "Alone time — I need quiet to feel myself", e:0,i:2 }] },
    { text: "At a gathering where you know nobody, you tend to...", options: [{ text: "Introduce myself and start conversations", e:2,i:0 }, { text: "Stick to one person or mostly observe", e:0,i:2 }] },
    { text: "Facing a big decision, you usually...", options: [{ text: "Talk it through — other people's input helps", e:2,i:0 }, { text: "Reflect privately first before deciding", e:0,i:2 }] },
    { text: "After a full day of social interaction you feel...", options: [{ text: "Energised — I actually feel better than before", e:2,i:0 }, { text: "Drained — I need alone time to recover", e:0,i:2 }] }
  ];

  const resultData = {
    extrovert: { label: "Extrovert", badgeBg: "#FAEEDA", badgeColor: "#633806", desc: "You thrive in social settings and draw energy from people around you. You're expressive, outgoing, and love engaging with the world." },
    ambivert:  { label: "Ambivert",  badgeBg: "#E1F5EE", badgeColor: "#085041", desc: "You sit comfortably in the middle — social when the mood is right, equally happy solo. You adapt well to different people and situations." },
    introvert: { label: "Introvert", badgeBg: "#EEEDFE", badgeColor: "#3C3489", desc: "You recharge through solitude and prefer deep one-on-one connections over crowds. Thoughtful, observant, with a rich inner world." }
  };

  let current = 0, scores = {e:0,i:0}, selected = null;

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startQuiz() { current = 0; scores = {e:0,i:0}; renderQ(); show('screen-quiz'); }

  function renderQ() {
    const q = questions[current];
    document.getElementById('prog-fill').style.width = (current / questions.length * 100) + '%';
    document.getElementById('prog-label').textContent = (current+1) + ' / ' + questions.length;
    document.getElementById('q-text').textContent = q.text;
    document.getElementById('q-options').innerHTML = q.options.map((o,i) =>
      `<button class="opt" onclick="pick(${i})"><span class="opt-letter">${['A','B'][i]}</span>${o.text}</button>`
    ).join('');
    const nb = document.getElementById('next-btn');
    nb.style.display = 'none';
    nb.textContent = current === questions.length - 1 ? 'See my result' : 'Next';
    selected = null;
  }

  function pick(idx) {
    selected = idx;
    document.querySelectorAll('.opt').forEach((b,i) => b.classList.toggle('selected', i===idx));
    document.getElementById('next-btn').style.display = 'block';
  }

  function nextQ() {
    if (selected === null) return;
    const o = questions[current].options[selected];
    scores.e += o.e; scores.i += o.i;
    current++;
    if (current < questions.length) { renderQ(); }
    else { showResult(); }
  }

  function showResult() {
    const total = scores.e + scores.i;
    const ePct = Math.round(scores.e / total * 100);
    const iPct = 100 - ePct;
    const aPct = Math.round(100 - Math.abs(ePct - 50) * 2);
    const key = ePct >= 70 ? 'extrovert' : ePct <= 30 ? 'introvert' : 'ambivert';
    const r = resultData[key];

    document.getElementById('result-badge').textContent = r.label;
    document.getElementById('result-badge').style.background = r.badgeBg;
    document.getElementById('result-badge').style.color = r.badgeColor;
    document.getElementById('result-type').textContent = "You're an " + r.label.toLowerCase();
    document.getElementById('result-desc').textContent = r.desc;
    document.getElementById('share-toast').style.display = 'none';

    show('screen-result');
    setTimeout(() => {
      document.getElementById('bar-e').style.width = ePct + '%';
      document.getElementById('bar-a').style.width = aPct + '%';
      document.getElementById('bar-i').style.width = iPct + '%';
      document.getElementById('pct-e').textContent = ePct + '%';
      document.getElementById('pct-a').textContent = aPct + '%';
      document.getElementById('pct-i').textContent = iPct + '%';
    }, 100);
  }

  function restart() { startQuiz(); }

  function shareResult() {
    const type = document.getElementById('result-type').textContent;
    navigator.clipboard.writeText(type + ' — take the quiz: ' + window.location.href).then(() => {
      const t = document.getElementById('share-toast');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    });
  }
</script>

</body>
</html>

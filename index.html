<!--
For each question, your answer adds points to either the extrovert (E) or introvert (I) bucket:

Option A (social/outward) → +2 to E, +0 to I
Option B (solo/inward) → +0 to E, +2 to I

After 5 questions, the max possible is 10 points total (e.g. 10E + 0I, or 6E + 4I, etc).
Then:

Extrovert % = E points ÷ total × 100
Introvert % = 100 − extrovert %
Ambivert % = how close you are to 50/50 — calculated as 100 − |extrovert% − 50| × 2, so it peaks at 100% if you're perfectly balanced and drops toward 0% the more you lean either way

And the final result label is decided by:

Extrovert % ≥ 70 → Extrovert
Extrovert % ≤ 30 → Introvert
Anything in between → Ambivert

So for example if you pick 3 social answers and 2 solo answers: E=6, I=4, total=10 → 60% extrovert, 40% introvert, 80% ambivert → result is Ambivert.
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Garden — What's your social style?</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .site {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .screen { display: none; padding: 2.5rem 2rem; animation: fadeIn 0.3s ease; flex: 1; }
    .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Home screen */
    .hero-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: #EEEDFE; display: flex; align-items: center;
      justify-content: center; margin-bottom: 1.25rem;
    }
    .hero-icon i { font-size: 28px; color: #534AB7; }
    .hero-title { font-size: 22px; font-weight: 600; color: #111; text-align: center; margin-bottom: 0.5rem; }
    .hero-sub { font-size: 14px; color: #666; text-align: center; margin-bottom: 1.75rem; line-height: 1.6; max-width: 340px; }
    .start-btn {
      padding: 0.7rem 2.25rem; background: #7F77DD; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer;
    }
    .start-btn:hover { background: #534AB7; }

    /* Quiz screen */
    .quiz-wrap { width: 100%; }

    .dots-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.75rem; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #e5e5e5;
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .dot.done { background: #AFA9EC; }
    .dot.active { background: #7F77DD; transform: scale(1.3); }

    .q-title { font-size: 12px; font-weight: 600; color: #7F77DD; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
    .q-text { font-size: 15px; font-weight: 500; color: #111; margin-bottom: 1.25rem; line-height: 1.45; }

    .opt {
      display: flex; align-items: flex-start; gap: 12px;
      width: 100%; padding: 0.625rem 0.875rem; margin-bottom: 0.6rem;
      border-radius: 12px; border: 0.5px solid #ddd;
      background: #fff; color: #222; font-size: 13px;
      cursor: pointer; text-align: left; line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
    }
    .opt:hover { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; }
    .opt.selected { border: 2px solid #7F77DD; background: #EEEDFE; color: #3C3489; font-weight: 500; }
    .opt-letter {
      width: 24px; height: 24px; border-radius: 50%; border: 0.5px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; opacity: 0.6;
    }
    .back-btn {
      display: none; align-items: center; gap: 6px;
      margin-top: 1rem; padding: 0.5rem 1rem;
      border-radius: 8px; border: 0.5px solid #ddd;
      background: #fff; color: #666; font-size: 14px;
      cursor: pointer; font-family: inherit;
    }
    .back-btn:hover { background: #f5f5f5; color: #333; }

    /* Result screen */
    .result-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 99px;
      font-size: 13px; font-weight: 500; margin-bottom: 1rem;
    }
    .result-type { font-size: 26px; font-weight: 600; color: #111; margin-bottom: 0.75rem; text-align: center; }
    .result-image { width: 100%; max-width: 380px; height: auto; border-radius: 12px; margin-bottom: 1.25rem; display: block; }
    .result-desc { font-size: 14px; color: #555; text-align: center; line-height: 1.6; margin-bottom: 1.75rem; max-width: 380px; }

    .score-section {
      width: 100%; background: #fafafa; border: 0.5px solid #e5e5e5;
      border-radius: 12px; padding: 1.125rem; margin-bottom: 1.5rem;
    }
    .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .score-row:last-child { margin-bottom: 0; }
    .score-name { font-size: 13px; color: #666; width: 70px; text-align: right; }
    .score-bg { flex: 1; height: 8px; background: #e5e5e5; border-radius: 99px; overflow: hidden; }
    .score-inner { height: 100%; border-radius: 99px; transition: width 0.7s ease; width: 0%; }
    .score-pct { font-size: 13px; color: #666; width: 34px; }

    .action-row { display: flex; gap: 10px; width: 100%; }
    .retry-btn {
      flex: 1; padding: 0.7rem; border-radius: 8px;
      border: 0.5px solid #ccc; background: #fff; color: #222;
      font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .retry-btn:hover { background: #f5f5f5; }
    .share-btn {
      flex: 1; padding: 0.7rem; border-radius: 8px;
      border: none; background: #7F77DD; color: #fff;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    .share-btn:hover { background: #534AB7; }
    .share-toast { font-size: 13px; color: #0F6E56; margin-top: 0.75rem; text-align: center; display: none; }

    footer {
      text-align: center; font-size: 12px; color: #aaa;
      padding: 1rem; border-top: 0.5px solid #eee;
      width: 100%;
    }

    /* Mobile */
    @media (max-width: 480px) {
      body { padding: 0; justify-content: flex-start; }
      .site { max-width: 100%; border-radius: 0; border-left: none; border-right: none; min-height: 100vh; }
      .screen { padding: 1.5rem 1.25rem; }

      .hero-icon { width: 52px; height: 52px; margin-bottom: 1rem; }
      .hero-icon i { font-size: 22px; }
      .hero-title { font-size: 19px; margin-bottom: 0.4rem; }
      .hero-sub { font-size: 13px; margin-bottom: 1.5rem; max-width: 280px; line-height: 1.5; }
      .start-btn { padding: 0.6rem 1.9rem; font-size: 14px; }

      .dots-row { gap: 6px; margin-bottom: 1.25rem; }
      .dot { width: 7px; height: 7px; }

      .q-title { font-size: 11px; margin-bottom: 0.4rem; }
      .q-text { font-size: 13.5px; margin-bottom: 1rem; line-height: 1.4; }
      .opt { font-size: 12.5px; padding: 0.55rem 0.75rem; margin-bottom: 0.5rem; gap: 8px; }
      .back-btn { font-size: 13px; padding: 0.45rem 0.9rem; margin-top: 0.75rem; }

      .result-badge { font-size: 12px; padding: 5px 14px; margin-bottom: 0.75rem; }
      .result-type { font-size: 19px; margin-bottom: 0.5rem; }
      .result-image { max-width: 100%; margin-bottom: 1rem; }
      .result-desc { font-size: 13px; margin-bottom: 1.25rem; line-height: 1.5; }

      .score-section { padding: 0.9rem; margin-bottom: 1.1rem; }
      .score-row { margin-bottom: 8px; gap: 8px; }
      .score-name { font-size: 12px; width: 60px; }
      .score-pct { font-size: 12px; width: 30px; }

      .action-row { flex-direction: column; gap: 8px; }
      .retry-btn, .share-btn { padding: 0.6rem; font-size: 13px; }

      footer { font-size: 11px; padding: 0.75rem; }
    }
  </style>
</head>

        <div class="score-row">
          <div class="score-name">Extrovert</div>
          <div class="score-bg"><div class="score-inner" id="bar-e" style="background:#EF9F27;"></div></div>
          <div class="score-pct" id="pct-e">0%</div>
        </div>
        <div class="score-row">
          <div class="score-name">Ambivert</div>
          <div class="score-bg"><div class="score-inner" id="bar-a" style="background:#1D9E75;"></div></div>

        </div>
        <div class="score-row">
          <div class="score-name">Introvert</div>
          <div class="score-bg"><div class="score-inner" id="bar-i" style="background:#7F77DD;"></div></div>

<script>
  const questions = [
    {
      title: "Q1 — The Couch",
      text: "You had a long day. You're finally home after work. The TV is on, your dishes are still in the sink and you haven't showered… You're on the couch now feeling sleepy. What do you do?",
      options: [
        { text: "Set a 15-minute alarm, then close your eyes.", e:0, i:2 },
        { text: "\"I'll deal with it after I wake up.\"", e:0, i:2 },
        { text: "You suddenly remembered your parcel arrived and head outside to collect it and open the package.", e:2, i:0 },
        { text: "Get up immediately before you lose the motivation.", e:2, i:0 }
      ]
    },
    {
      title: "Q2 — Welcome to Mind Garden",
      text: "You blink. You're suddenly no longer in your living room. You're standing inside Mind Garden, where adorable little creatures are wandering around. The sign says: Find the Garden Gate. What's your first instinct?",
      options: [
        { text: "Look around to understand what is going on first.", e:0, i:2 },
        { text: "Can't wait for an adventure of a lifetime!", e:2, i:0 },
        { text: "Keep getting distracted by all the cute creatures and take photos of them.", e:2, i:0 },
        { text: "Spot one really interesting tree and head straight there.", e:0, i:2 }
      ]
    },
    {
      title: "Q3 — The Backpack",
      text: "As you start walking, a tiny rabbit hands you a backpack. You can only bring ONE thing. Which do you pick?",
      options: [
        { text: "📒 Notebook", e:0, i:2 },
        { text: "🍪 Snacks", e:0, i:2 },
        { text: "🔦 Flashlight", e:2, i:0 },
        { text: "🎲 Mystery Box", e:2, i:0 }
      ]
    },
    {
      title: "Q4 — The Glowing Forest",
      text: "You're following the path... Then you notice glowing mushrooms. Do you...",
      options: [
        { text: "Start jumping on them like their steps.", e:2, i:0 },
        { text: "Wander off to explore.", e:2, i:0 },
        { text: "Stay on the path.", e:0, i:2 },
        { text: "Pluck them out of the ground and keep them in your bag.", e:0, i:2 }
      ]
    },
    {
      title: "Q5 — The River",
      text: "As you continue walking, you reach a river. The bridge to the other side is broken. You...",
      options: [
        { text: "Think of the safest route to get across.", e:0, i:2 },
        { text: "Jump across.", e:2, i:0 },
        { text: "Sit down and think for a while.", e:0, i:2 },
        { text: "Notice some fish swimming and want to go catch them.", e:2, i:0 }
      ]
    },
    {
      title: "Q6 — Lost Keys",
      text: "After crossing the bridge, a squirrel runs over. \"I've lost my keys!\" You...",
      options: [
        { text: "Help search every corner carefully.", e:0, i:2 },
        { text: "Ask where they last saw them.", e:0, i:2 },
        { text: "Search together, but notice lots of other interesting things too.", e:2, i:0 },
        { text: "Start checking immediately without asking questions.", e:2, i:0 }
      ]
    },
    {
      title: "Q7 — The Giant Library",
      text: "You walk into a magical library. How does this usually end?",
      options: [
        { text: "I accidentally spend hours reading one topic.", e:0, i:2 },
        { text: "I pick up six different books.", e:2, i:0 },
        { text: "I find one book I came for and leave.", e:0, i:2 },
        { text: "I remember I was supposed to be somewhere else.", e:2, i:0 }
      ]
    },
    {
      title: "Q8 — The Treasure Chest",
      text: "As you are leaving the library, you find a locked treasure chest. What's your approach?",
      options: [
        { text: "Study the lock carefully.", e:0, i:2 },
        { text: "Try every key.", e:2, i:0 },
        { text: "Look around for clues.", e:0, i:2 },
        { text: "Get distracted before opening it.", e:2, i:0 }
      ]
    }
  ];

  const resultData = {
    extrovert: { label: "Extrovert", badgeBg: "#FAEEDA", badgeColor: "#633806", desc: "You thrive in social settings and draw energy from people around you. You're expressive, outgoing, and love engaging with the world." },
    ambivert:  { label: "Ambivert",  badgeBg: "#E1F5EE", badgeColor: "#085041", desc: "You sit comfortably in the middle: social when the mood is right, equally happy solo. You adapt well to different people and situations." },
    introvert: { label: "Introvert", badgeBg: "#EEEDFE", badgeColor: "#3C3489", desc: "You recharge through solitude and prefer deep one-on-one connections over crowds. Thoughtful, observant, with a rich inner world." }
  };

  let current = 0, scores = {e:0,i:0}, selected = null, history = [];

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startQuiz() { current = 0; scores = {e:0,i:0}; history = []; renderQ(); show('screen-quiz'); }

  function renderQ() {
    const q = questions[current];
    const dots = document.getElementById('q-dots');
    dots.innerHTML = '';
    for (let i = 0; i < questions.length; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
      dots.appendChild(d);
    }
    document.getElementById('q-title').textContent = q.title;
    document.getElementById('q-text').textContent = q.text;
    const prevIdx = history[current];
    document.getElementById('q-options').innerHTML = q.options.map((o,i) =>
      `<button class="opt${prevIdx === i ? ' selected' : ''}" onclick="pick(${i})">${o.text}</button>`
    ).join('');
    document.getElementById('back-btn').style.display = current > 0 ? 'flex' : 'none';
    selected = null;
  }

  function pick(idx) {
    selected = idx;
    document.querySelectorAll('.opt').forEach((b,i) => b.classList.toggle('selected', i===idx));
    const o = questions[current].options[idx];
    scores.e += o.e; scores.i += o.i;
    history[current] = idx;
    current++;
    setTimeout(() => {
      if (current < questions.length) { renderQ(); }
      else { showResult(); }
    }, 300);
  }

  function goBack() {
    if (current <= 0) return;
    current--;
    const prevIdx = history[current];
    if (prevIdx !== undefined) {
      const o = questions[current].options[prevIdx];
      scores.e -= o.e; scores.i -= o.i;
    }
    renderQ();
  }

  function showResult() {
    const total = scores.e + scores.i;
    const ePct = Math.round(scores.e / total * 100);
    const iPct = 100 - ePct;
    const aPct = Math.round(100 - Math.abs(ePct - 50) * 2);
    const key = ePct >= 70 ? 'extrovert' : ePct <= 30 ? 'introvert' : 'ambivert';
    const r = resultData[key];

    document.getElementById('result-badge').textContent = "<placeholder result page>";
    document.getElementById('result-badge').style.background = r.badgeBg;
    document.getElementById('result-badge').style.color = r.badgeColor;
    document.getElementById('result-type').textContent = "<placeholder result page>";
    document.getElementById('result-desc').textContent = "<placeholder description>";
    document.getElementById('share-toast').style.display = 'none';

    show('screen-result');
    setTimeout(() => {
      document.getElementById('bar-e').style.width = ePct + '%';
      document.getElementById('bar-a').style.width = aPct + '%';
      document.getElementById('bar-i').style.width = iPct + '%';
      document.getElementById('pct-e').textContent = ePct + '%';
      document.getElementById('pct-a').textContent = aPct + '%';
      document.getElementById('pct-i').textContent = iPct + '%';
    }, 100);
  }

  function restart() { current = 0; scores = {e:0,i:0}; history = []; renderQ(); show('screen-quiz'); }

  function shareResult() {
    const type = document.getElementById('result-type').textContent;
    navigator.clipboard.writeText(type + ' — take the quiz: ' + window.location.href).then(() => {
      const t = document.getElementById('share-toast');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    });
  }
</script>
